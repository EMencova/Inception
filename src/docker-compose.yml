version: "3,5"

networks:
  my-network:
    name: my-network
    driver: bridge

volumes:
  wordpress:
    driver: local
    name: wordpress
    driver-opts:
      type: none
      o: bind
      device: /home/...........

  mariadb:
    driver: local
    name: mariadb
    driver-opts:
      type: none
      o: bind
      device: /home/......

services:
  maria_db:
    container_name: maria_db
    build: ./whatever folder its in 
    env-file:
      - .env
    volumes:
      - mariadb: /wherever it is
    networks:
      my-network
    restart:
      unless-stopped

services:
  word_press:
    container_name: word_press
    build: ./whatever folder its in 
    env-file:
      - .env
    volumes:
      - mariadb: /wherever it is
    networks:
      my-network
    restart:
      unless-stopped


Nginx:
  container_name: Nginx
  build: ./wherever it is in
  ports:
    -"443:443"
  depends_on:
    -word_press
  volumes:
    - wordpress: /var/www/html


